<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="logo">🛒</div>
      <h2>StockMart</h2>
      <p>Crear cuenta nueva</p>
    </div>
    <div class="login-body">
      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }
      @if (exito) {
        <div class="alert alert-success">{{ exito }}</div>
      }
      <div class="mb-3">
        <label class="form-label">Nombre completo</label>
        <input type="text" class="form-control" [(ngModel)]="nombre" placeholder="Tu nombre" />
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="email" placeholder="correo@ejemplo.com" />
      </div>
      <div class="mb-3">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-control" [(ngModel)]="password" placeholder="••••••••" />
      </div>
      <div class="mb-3">
    <label class="form-label">Rol</label>
    <select class="form-control" [(ngModel)]="rol">
      <option value="empleado">Empleado</option>
      <option value="administrador">Administrador</option>
    </select>
</div>
      <button class="btn btn-success w-100" (click)="registro()" [disabled]="cargando">
        {{ cargando ? 'Registrando...' : 'Registrarse' }}
      </button>
      <div class="text-center mt-3">
        <small>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión</a></small>
      </div>
    </div>
  </div>
</div>
